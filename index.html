// Seed studio name suggestions from Firm Directory (Firm_Info_Cleaned.xlsx)

  var FIRM_NAMES = ["7 Sense Studio","Ace Interior Design","Ace's Design","Brick & Decor","Butler Interior","Charlotte's Carpentry","Dan Avenue | 巧妙设计","Darwin Interior","Decor 8","Design 4 Space","ECasa Studio","Exqsite Interior Design","Fineline Design","Fyner Interior","GoDesign","Image Creative Design","Jialux Interior","Juz Interior","Key Concept","Kinjo Studios","Le Interior Affairs","Lime 3","Lime3 Dezign","M-Concept Interior","Massing Design","MET Interior","Molecule Interior","Mr Designer Gallery","Mr Designer Studio","Ovon Design","Posh Living Interior Design","ProjectGuru","Renologist","SG Interior Design","Starry Homestead","Supersketch Designers","Swiss Interior Design","T&T Design Artisan","The Interior Lab","U-Home Interior Design","Weiken","Yang's Inspiration Design"];
  try {
    var existing = JSON.parse(localStorage.getItem("qanvast_studio_names") || "[]");

<script>
// iOS doesn't support requestFullscreen — patch it to show an Add to Home Screen prompt
(function() {
  var isIOS = /iP(ad|hone|od)/.test(navigator.userAgent) && !window.MSStream;
  var isStandalone = window.navigator.standalone === true;
  if (!isIOS) return;
  document.documentElement.requestFullscreen = function() {
    if (isStandalone) return Promise.resolve();
    var existing = document.getElementById('__ios-fs-tip');
    if (existing) { existing.remove(); return Promise.resolve(); }
    var tip = document.createElement('div');
    tip.id = '__ios-fs-tip';
    tip.style.cssText = [
      'position:fixed','bottom:24px','left:50%','transform:translateX(-50%)',
      'background:#1C1C1A','color:#EDEDE9','font-family:DM Sans,system-ui,sans-serif',
      'font-size:14px','line-height:1.5','padding:14px 18px','border-radius:8px',
      'border:1px solid #3E3E3C','z-index:99999','max-width:320px','text-align:center',
      'box-shadow:0 8px 32px rgba(0,0,0,0.6)'
    ].join(';');
    tip.innerHTML = '<strong style="display:block;margin-bottom:6px">Full-screen on iPad</strong>' +
      'Tap <strong>Share</strong> (&#x25A1;&uarr;) → <strong>Add to Home Screen</strong>. ' +
      'Opening from your Home Screen removes Safari\'s chrome entirely.' +
      '<br><button onclick="document.getElementById(\'__ios-fs-tip\').remove()" ' +
      'style="margin-top:10px;padding:6px 16px;background:#3E3E3C;color:#EDEDE9;border:none;' +
      'border-radius:4px;font-size:13px;cursor:pointer">Got it</button>';
    document.body.appendChild(tip);
    setTimeout(function() { if (tip.parentNode) tip.remove(); }, 8000);
    return Promise.resolve();
  };
  document.exitFullscreen = function() { return Promise.resolve(); };
  Object.defineProperty(document, 'fullscreenElement', { get: function() {
    return isStandalone ? document.documentElement : null;
  }, configurable: true});
})();
</script>
